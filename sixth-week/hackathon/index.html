<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Farm Afet Destek Ağı | Hayvan Kurtarma</title>
    <meta name="description" content="Kriz yönetimi ve güncel yardım ilanları platformu.">

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="offline-banner" class="offline-banner hidden">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>İnternet bağlantınız koptu. Şu an çevrimdışı moddasınız. Veriler son kaydedilen haliyle
            gösteriliyor.</span>
    </div>

    <header class="app-header">
        <div class="container header-content">
            <div class="logo">
                <i class="fa-solid fa-truck-field-un"></i>
                <h1>Q-Farm Afet Destek Ağı</h1>
            </div>

            <div class="header-actions" style="display: flex; align-items: center; gap: 1rem;">
                <a href="../index.html" class="action-btn"
                    style="text-decoration: none; padding: 0.5rem 1rem; width: auto; margin-top: 0; background: var(--surface-hover); border: 1px solid var(--border-color); color: var(--text-primary);"><i
                        class="fa-solid fa-leaf"></i> Q-Farm'a Dön</a>
                <button id="theme-toggle" class="icon-btn" title="Tema Değiştir">
                    <i class="fa-regular fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container main-layout">
        <!-- Sol/Üst: İlanlar -->
        <section class="announcements-section">
            <div class="section-header">
                <h2><i class="fa-solid fa-paw"></i> Hayvan Kurtarma ve Acil Destek</h2>
                <div class="pulse-indicator">
                    <span class="pulse"></span> Canlı Akış
                </div>
            </div>

            <!-- Arama ve Filtreleme Kontrolleri -->
            <div class="controls-toolbar">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="İlanlarda ara (örn: çadır, kan)...">
                </div>

                <div class="sort-box">
                    <select id="sort-select" class="custom-select">
                        <option value="newest">En Yeni</option>
                        <option value="oldest">En Eski</option>
                        <option value="urgent">Aciliyet (Önce Acil)</option>
                    </select>
                </div>
            </div>

            <!-- Kategoriler (Dinamik eklenecek) -->
            <div class="filters-container">
                <button class="filter-btn active" data-category="all">Tümü</button>
                <div id="category-filters" class="category-filters"></div>
            </div>

            <!-- İnteraktif Harita Alanı -->
            <div class="map-section">
                <div class="section-header" style="margin-bottom: 0.5rem; justify-content: flex-start; gap: 1rem;">
                    <h3><i class="fa-solid fa-map-location-dot"></i> Afet Bölgesi Haritası</h3>
                    <button id="toggle-map-btn" class="text-btn">Haritayı Gizle</button>
                </div>
                <div id="map-container" class="map-container"></div>
            </div>

            <!-- İlan Listesi -->
            <div id="announcements-grid" class="cards-grid">
                <!-- JS ile kartlar buraya eklenecek -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Veriler Yükleniyor...</p>
                </div>
            </div>
        </section>

        <!-- Sağ/Alt: Görevlerim -->
        <aside class="tasks-section">
            <div class="section-header">
                <h2><i class="fa-solid fa-clipboard-list"></i> Benim Görevlerim</h2>
                <span id="task-count" class="badge">0</span>
            </div>

            <div id="my-tasks-list" class="tasks-list">
                <!-- JS ile üstlenilen görevler buraya eklenecek -->
                <div class="empty-state">
                    <i class="fa-regular fa-folder-open"></i>
                    <p>Henüz bir görev üstlenmediniz.</p>
                </div>
            </div>
        </aside>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>

</html>
